<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Equipos — Mundial API</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/animations.css">
</head>
<body>

  <nav class="nav">
    <div class="nav__brand">
      <span class="nav__brand-icon">🏆</span>
      Mundial API
    </div>
    <div class="nav__links">
      <a href="../index.html" class="nav__link">
        <span class="nav__link-icon">🏠</span>
        <span>Inicio</span>
      </a>
      <a href="equipos.html" class="nav__link active">
        <span class="nav__link-icon">🌍</span>
        <span>Equipos</span>
      </a>
      <a href="grupos.html" class="nav__link">
        <span class="nav__link-icon">🏷️</span>
        <span>Grupos</span>
      </a>
      <a href="formacion.html" class="nav__link">
        <span class="nav__link-icon">🎲</span>
        <span>Formación</span>
      </a>
    </div>
  </nav>

  <main class="layout">

    <div class="page-header">
      <div>
        <div class="page-header__title">🌍 Equipos</div>
        <div class="page-header__subtitle">
          <span id="equipos-count">0</span> equipos registrados
        </div>
      </div>
      <button class="btn btn--primary" id="btn-nuevo-equipo">
        ➕ Nuevo Equipo
      </button>
    </div>

    <div class="card page-enter">
      <div class="card__header">
        <div class="card__title">📋 Lista de equipos</div>
      </div>
      <div id="equipos-table"></div>
    </div>

  </main>

  <div class="modal-overlay" id="equipo-modal">
    <div class="modal">
      <div class="modal__header">
        <div class="modal__title" id="modal-title">Nuevo Equipo</div>
        <button class="modal__close" aria-label="Cerrar">✕</button>
      </div>
      <div class="modal__body">
        <form id="equipo-form" novalidate>

          <div class="form-group">
            <label class="form-label" for="field-nombrePais">Nombre del país <span>*</span></label>
            <input class="form-control" id="field-nombrePais" type="text" placeholder="Argentina" maxlength="100" autocomplete="off">
            <div class="form-error" id="error-nombrePais"></div>
          </div>

          <div class="form-group">
            <label class="form-label" for="field-codigoFifa">Código FIFA <span>*</span></label>
            <input class="form-control" id="field-codigoFifa" type="text" placeholder="ARG" maxlength="3" style="text-transform:uppercase" autocomplete="off">
            <div class="form-hint">Exactamente 3 letras mayúsculas (ej: ARG, BRA, ESP)</div>
            <div class="form-error" id="error-codigoFifa"></div>
          </div>

          <div class="form-group">
            <label class="form-label" for="field-directorTecnico">Director Técnico <span>*</span></label>
            <input class="form-control" id="field-directorTecnico" type="text" placeholder="Lionel Scaloni" maxlength="100" autocomplete="off">
            <div class="form-error" id="error-directorTecnico"></div>
          </div>

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
            <div class="form-group">
              <label class="form-label" for="field-rankingFifa">Ranking FIFA <span>*</span></label>
              <input class="form-control" id="field-rankingFifa" type="number" placeholder="1" min="1" autocomplete="off">
              <div class="form-error" id="error-rankingFifa"></div>
            </div>

            <div class="form-group">
              <label class="form-label" for="field-cantidadJugadores">Jugadores <span>*</span></label>
              <input class="form-control" id="field-cantidadJugadores" type="number" placeholder="23" min="23" max="26" autocomplete="off">
              <div class="form-hint">Entre 23 y 26</div>
              <div class="form-error" id="error-cantidadJugadores"></div>
            </div>
          </div>

        </form>
      </div>
      <div class="modal__footer">
        <button class="btn btn--outline modal__close">Cancelar</button>
        <button class="btn btn--primary" onclick="document.getElementById('equipo-form').requestSubmit()">
          Guardar
        </button>
      </div>
    </div>
  </div>

  <script src="../assets/js/api/client.js"></script>
  <script src="../assets/js/components/spinner.js"></script>
  <script src="../assets/js/components/toast.js"></script>
  <script src="../assets/js/components/modal.js"></script>
  <script src="../assets/js/components/table.js"></script>
  <script src="../assets/js/modules/equipos.js"></script>
  <script src="../assets/js/app.js"></script>

</body>
</html>
