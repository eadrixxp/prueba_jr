      <div class="sidebar__brand-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/></svg>
      </div>
      <span class="sidebar__brand-name">Mundial API</span>
    </div>

    <nav class="sidebar__nav">
      <span class="sidebar__section-label">Navegación</span>

      <a href="../index.html" class="sidebar__link">
        <span class="sidebar__link-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </span>
        <span class="sidebar__link-label">Inicio</span>
      </a>

      <a href="equipos.html" class="sidebar__link">
        <span class="sidebar__link-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        </span>
        <span class="sidebar__link-label">Equipos</span>
      </a>

      <a href="grupos.html" class="sidebar__link active">
        <span class="sidebar__link-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
        </span>
        <span class="sidebar__link-label">Grupos</span>

      <a href="formacion.html" class="sidebar__link">
        <span class="sidebar__link-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
        </span>
        <span class="sidebar__link-label">Formación</span>
      </a>
    </nav>

    <div class="sidebar__footer">Mundial API &copy; 2025</div>
  </aside>

  <main class="layout">

    <div class="page-header">
      <div>
        <div class="page-header__title">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
          Grupos
        </div>
        <div class="page-header__subtitle">
          <span id="grupos-count">0</span> grupos registrados
        </div>
      </div>
      <button class="btn btn--primary" id="btn-nuevo-grupo">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Nuevo Grupo
      </button>
    </div>

    <div class="card page-enter">
      <div class="card__header">
        <div class="card__title">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          Lista de grupos
        </div>
      </div>
      <div id="grupos-table"></div>
    </div>

  </main>

  <div class="modal-overlay" id="grupo-modal">
    <div class="modal">
      <div class="modal__header">
        <div class="modal__title" id="modal-title">Nuevo Grupo</div>
        <button class="modal__close" aria-label="Cerrar">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal__body">
        <form id="grupo-form" novalidate>

          <div class="form-group">
            <label class="form-label" for="field-nombre">Nombre del grupo <span>*</span></label>
            <input class="form-control" id="field-nombre" type="text" placeholder="Grupo A" maxlength="10" autocomplete="off">
            <div class="form-hint">Máximo 10 caracteres (ej: Grupo A)</div>
            <div class="form-error" id="error-nombre"></div>
          </div>

          <div class="form-group">
            <label class="form-label" for="field-descripcion">Descripción</label>
            <input class="form-control" id="field-descripcion" type="text" placeholder="Descripción opcional" autocomplete="off">
          </div>

        </form>
      </div>
      <div class="modal__footer">
        <button class="btn btn--outline modal__close">Cancelar</button>
        <button class="btn btn--primary" onclick="document.getElementById('grupo-form').requestSubmit()">Guardar</button>
      </div>
    </div>
  </div>

  <script src="../assets/js/api/client.js"></script>
  <script src="../assets/js/components/spinner.js"></script>
  <script src="../assets/js/components/toast.js"></script>
  <script src="../assets/js/components/modal.js"></script>
  <script src="../assets/js/components/table.js"></script>
  <script src="../assets/js/modules/grupos.js"></script>
  <script src="../assets/js/app.js"></script>

</body>
</html>
